name: build

# Windows-only CI — on purpose. We develop on a Mac, so macOS is built + validated
# locally; this workflow covers the build we can't make locally: Windows (to hand a
# tester or cross-check). The universal macOS build happens only in release.yml, on a tag.
#
# Runs on demand or on a PR that touches code — not on every commit.

on:
  pull_request:
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - 'resources/**'
      - 'tools/**'
      - 'tests/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# Least privilege for GITHUB_TOKEN: this workflow only reads the repo and uploads
# build artifacts (artifacts API — not contents). Nothing here writes back to the repo.
permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 45          # safety cap for a hung build (NAM/Eigen add cold-compile time)
    env:
      SCCACHE_GHA_ENABLED: "true"   # sccache uses the GitHub Actions cache as its object store
    steps:
      - uses: actions/checkout@v7

      # Ninja invokes cl.exe directly, so it needs the MSVC toolchain on PATH (what the VS/MSBuild
      # generator sets up itself). arch pinned explicitly — one less surprise if the runner image changes.
      - name: MSVC dev environment (vcvars for Ninja)
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756   # v1.13.0
        with:
          arch: x64

      # Compiler cache. MUST precede Configure, not just Build: JUCE builds its `juceaide` host tool at
      # configure time and passes this compiler launcher through to that sub-build, so `sccache` has to
      # be on PATH already when we configure.
      - name: sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696   # v0.0.10

      # Sources only (FetchContent checkouts + the juceaide sub-build tree) — not objects; sccache caches
      # objects. The generator is in the key so a stale MSBuild-era cache can't be restored under
      # -G Ninja (its cached CMakeCache would mismatch the generator and fail configure).
      - name: Cache JUCE (FetchContent)
        uses: actions/cache@v6
        with:
          path: build/_deps
          key: juce-windows-ninja-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      # single-config Ninja: no --config, and Ninja parallelises by default (drop --parallel).
      - name: Build
        run: cmake --build build

      # Cache health on every run: warm runs should show a high hit rate and (the classic MSVC trap)
      # ~0 non-cacheable. Release emits no /Zi here, so non-cacheable should read ~0; if it ever doesn't,
      # add `-DCMAKE_POLICY_DEFAULT_CMP0141=NEW -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded` to
      # Configure (a bare -D…FORMAT is a silent no-op at cmake_minimum_required(3.22) — CMP0141 OLD).
      - name: sccache stats
        if: always()
        run: sccache --show-stats

      # Headless unit tests for the cab:: DSP core (links core/ only). Hard gate —
      # the runner returns non-zero on any failed UnitTest.
      - name: Core unit tests (cab)
        shell: bash
        run: ./build/OrbitCab_Tests_artefacts/Release/*.exe

      # Offline integration render through the real processor (TRIM/HEAD/SNAPSHOT/
      # EMBED/UNDO/STATE/LIBRARY). Returns non-zero on any BROKEN result.
      - name: Integration DSP tests
        shell: bash
        run: ./build/orbitcab_dsp_test_artefacts/Release/*.exe

      # Channel-mute / auto-level envelope (#45): asserts the output stays flat through a
      # mute toggle (no dip, no overshoot). Non-zero if the regression returns.
      - name: Mute/auto-level envelope gate
        shell: bash
        run: ./build/orbitcab_fade_measure_artefacts/Release/*.exe

      # White-box tube power-amp core battery (block 2): PP even-cancellation / THD-vs-drive / drive-comp
      # unity / measured latency / aliasing operating-range MAP / RT no-alloc / lifecycle + cross-platform
      # robustness. Plain JUCE-free exe; returns non-zero on any failed check.
      - name: Tube poweramp core golden
        shell: bash
        run: |
          # MSVC puts plain add_executable() binaries under build/Release/. (A loose
          # `find ...golden* | head -1` used to match a .tlog build-state file first and
          # try to EXECUTE it — the step failed without ever running the golden.)
          ./build/Release/orbitcab_poweramp_core_golden.exe

      - name: Validate (pluginval, VST3)
        shell: bash
        run: |
          curl -L -o pluginval.zip https://github.com/Tracktion/pluginval/releases/download/v1.0.3/pluginval_Windows.zip
          7z x -y pluginval.zip >/dev/null
          ./pluginval.exe --strictness-level 10 --validate "build/OrbitCab_artefacts/Release/VST3/OrbitCab.vst3"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: OrbitCab-Windows
          if-no-files-found: ignore
          path: |
            build/OrbitCab_artefacts/Release/VST3/OrbitCab.vst3
            build/OrbitCab_artefacts/Release/CLAP/OrbitCab.clap
            build/OrbitCab_artefacts/Release/Standalone
