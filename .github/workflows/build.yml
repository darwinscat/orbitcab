name: build

# Windows + Linux CI. We develop on a Mac (macOS built + validated locally); this workflow
# covers the platforms we can't build locally — Windows and Linux — building each, running
# the headless unit + DSP tests and pluginval @10. The universal macOS build is in
# release.yml, on a tag.
#
# Runs on demand or on a PR that touches code — not on every commit.

on:
  pull_request:
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - 'resources/**'
      - 'tools/**'
      - 'tests/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 30          # safety cap for a hung build
    steps:
      - uses: actions/checkout@v6

      - name: Cache JUCE (FetchContent)
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: juce-windows-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      # Headless unit tests for the cab:: DSP core (links core/ only). Hard gate —
      # the runner returns non-zero on any failed UnitTest.
      - name: Core unit tests (cab)
        shell: bash
        run: ./build/OrbitCab_Tests_artefacts/Release/*.exe

      # Offline integration render through the real processor (TRIM/HEAD/SNAPSHOT/
      # EMBED/UNDO/STATE/LIBRARY). Returns non-zero on any BROKEN result.
      - name: Integration DSP tests
        shell: bash
        run: ./build/orbitcab_dsp_test_artefacts/Release/*.exe

      - name: Validate (pluginval, VST3)
        shell: bash
        run: |
          curl -L -o pluginval.zip https://github.com/Tracktion/pluginval/releases/download/v1.0.3/pluginval_Windows.zip
          7z x -y pluginval.zip >/dev/null
          ./pluginval.exe --strictness-level 10 --validate "build/OrbitCab_artefacts/Release/VST3/OrbitCab.vst3"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: OrbitCab-Windows
          if-no-files-found: ignore
          path: |
            build/OrbitCab_artefacts/Release/VST3/OrbitCab.vst3
            build/OrbitCab_artefacts/Release/CLAP/OrbitCab.clap
            build/OrbitCab_artefacts/Release/Standalone

  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6

      # JUCE Linux deps (no web/curl — JUCE_WEB_BROWSER=0 / JUCE_USE_CURL=0). This exact
      # set was verified building + testing the plugin on a Debian 13 box; same names on Ubuntu.
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build xvfb \
            libasound2-dev libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libglu1-mesa-dev mesa-common-dev

      - name: Cache JUCE (FetchContent)
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: juce-linux-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Core unit tests (cab)
        run: ./build/OrbitCab_Tests_artefacts/Release/OrbitCab_Tests

      - name: Integration DSP tests
        run: ./build/orbitcab_dsp_test_artefacts/Release/orbitcab_dsp_test

      # pluginval opens the editor → needs a display on a headless runner (xvfb).
      - name: Validate (pluginval, VST3)
        run: |
          curl -L -o pluginval.zip https://github.com/Tracktion/pluginval/releases/download/v1.0.3/pluginval_Linux.zip
          unzip -o pluginval.zip >/dev/null
          chmod +x pluginval
          xvfb-run --auto-servernum ./pluginval --strictness-level 10 --validate "build/OrbitCab_artefacts/Release/VST3/OrbitCab.vst3"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: OrbitCab-Linux
          if-no-files-found: ignore
          path: |
            build/OrbitCab_artefacts/Release/VST3/OrbitCab.vst3
            build/OrbitCab_artefacts/Release/CLAP/OrbitCab.clap
            build/OrbitCab_artefacts/Release/Standalone
